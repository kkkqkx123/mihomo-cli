# mihomo-go 项目配置文件

[api]
# API 连接配置
address = "http://127.0.0.1:9090"
secret = ""  # 留空表示自动生成随机密钥
timeout = 10

[mihomo]
# Mihomo 内核配置
enabled = true  # 是否自动启动 mihomo 内核
executable = "E:\\server\\mihomo\\mihomo-windows-amd64.exe"  # mihomo 可执行文件路径
config_file = "E:\\project\\mihomo-go\\test-mihomo-config.yaml"  # mihomo 配置文件路径（留空则使用默认路径）
auto_generate_secret = true  # 是否自动生成随机密钥

[mihomo.api]
# Mihomo API 控制器配置
external_controller = "127.0.0.1:9090"
external_controller_tls = ""
external_controller_unix = ""
external_controller_pipe = ""

[mihomo.log]
# Mihomo 日志配置
level = "info"
file = ""  # 日志文件路径（留空则输出到控制台）
