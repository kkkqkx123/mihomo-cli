# 简化配置用于测试
mixed-port: 7890
mode: rule
log-level: info

# API 控制器
external-controller: 127.0.0.1:9090
secret: "123456"

# DNS
dns:
  enable: true
  enhanced-mode: fake-ip
  nameserver:
    - 8.8.8.8

# 代理组配置
proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - DIRECT

rules:
  - MATCH,Proxy
